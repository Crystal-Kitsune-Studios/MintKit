# .github/workflows/build.yml
name: Build MintKit OS Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:

      - uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/linux-*
            .build/rpi-firmware
          key: mintkit-build-$ hashFiles('rootfs/config/mintkit.conf') 

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            bison flex libssl-dev libgmp-dev libmpc-dev \
            device-tree-compiler u-boot-tools \
            debootstrap qemu-user-static binfmt-support \
            parted dosfstools e2fsprogs kpartx \
            wget xz-utils bzip2 rsync

      - name: Build firmware (Pi Zero 2 W boot files)
        run: sudo -E bash scripts/build-uboot.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Build kernel
        run: sudo -E bash scripts/build-kernel.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Build rootfs
        run: sudo -E bash scripts/build-rootfs.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Assemble image
        run: sudo -E bash scripts/build-image.sh

      - name: Extract version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Compress + checksum
        run: |
          sudo chown -R $USER:$USER dist/
          cd dist
          # Rename to versioned filename on tag builds; plain name on branch builds
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            mv mintkit-pizero2w.img mintkit-pizero2w-v${VERSION}.img
            IMG=mintkit-pizero2w-v${VERSION}.img
          else
            IMG=mintkit-pizero2w.img
          fi
          xz -T0 -9 "$IMG"
          sha256sum "${IMG}.xz" > "${IMG}.xz.sha256"
          md5sum    "${IMG}.xz" > "${IMG}.xz.md5"

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: mintkit-pizero2w-$ github.sha 
          path: dist/
          retention-days: 14

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -40)
          fi
          REL_DATE=$(date '+%-d %B %Y')
          IMG_NAME="mintkit-pizero2w-v${VERSION}.img.xz"
          cat > release_notes.md <<EOF
          ## MintKit v${VERSION}

          **Released:** ${REL_DATE}

          ### What's Changed
          ${COMMITS}

          ### Install
          Flash \`${IMG_NAME}\` to a microSD card using Raspberry Pi Imager or \`dd\`.
          See the [download page](https://pocketmint.crystal-kitsune-studios.com/download) for full instructions.

          ### Checksums
          \`\`\`<br>          $(cat dist/${IMG_NAME}.sha256)<br>          $(cat dist/${IMG_NAME}.md5)<br>          \`\`\`
          EOF

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "MintKit v$ env.VERSION "
          body_path: release_notes.md
          files: dist/*
          draft: false
          prerelease: $ contains(github.ref_name, '-rc') 