# .github/workflows/build.yml
name: Build MintKit OS Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:

      - uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/linux-*
            .build/rpi-firmware
          key: mintkit-build-$ hashFiles('rootfs/config/mintkit.conf') 

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            bison flex libssl-dev libgmp-dev libmpc-dev \
            device-tree-compiler u-boot-tools \
            debootstrap qemu-user-static binfmt-support \
            parted dosfstools e2fsprogs kpartx \
            wget xz-utils bzip2 rsync

      - name: Build firmware (Pi Zero 2 W boot files)
        run: sudo -E bash scripts/build-uboot.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Build kernel
        run: sudo -E bash scripts/build-kernel.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Build rootfs
        run: sudo -E bash scripts/build-rootfs.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Assemble image
        run: sudo -E bash scripts/build-image.sh

      - name: Compress + checksum
        run: |
          sudo chown -R $USER:$USER dist/
          cd dist
          xz -T0 -9 mintkit-pizero2w.img
          sha256sum mintkit-pizero2w.img.xz > mintkit-pizero2w.img.xz.sha256

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: mintkit-pizero2w-$ github.sha 
          path: dist/
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: MintKit $ github.ref_name 
          body: |
            ## Installation
            1. Download `mintkit-pizero2w.img.xz`
            2. Flash with [Balena Etcher](https://etcher.balena.io/)
            3. Insert SD card into Pi Zero 2 W, power on
            4. Default login: `mintkit` / `mintkit`
          files: dist/*
          draft: false
          prerelease: $ contains(github.ref_name, '-rc') 