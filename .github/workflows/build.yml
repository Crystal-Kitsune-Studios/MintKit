# .github/workflows/build.yml
name: Build MintKit OS Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:

      - uses: actions/checkout@v4

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build/rpi-firmware
            .build/kernel8.img
          key: rpi-kernel-stable

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            bison flex libssl-dev libgmp-dev libmpc-dev \
            device-tree-compiler u-boot-tools \
            debootstrap qemu-user-static binfmt-support \
            parted dosfstools e2fsprogs kpartx \
            wget xz-utils bzip2 rsync

      - name: Build firmware (Pi Zero 2 W boot files)
        run: sudo -E bash scripts/build-uboot.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      # rootfs runs BEFORE kernel — raspberrypi-kernel apt install puts
      # kernel8.img + /lib/modules/ into the rootfs, then build-kernel.sh
      # copies kernel8.img to dist/boot/. This guarantees kernel + modules
      # are always the same version (fixes missing brcmfmac WiFi driver).
      - name: Build rootfs
        run: sudo -E bash scripts/build-rootfs.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Build kernel
        run: sudo -E bash scripts/build-kernel.sh
        env:
          CROSS_COMPILE: aarch64-linux-gnu-
          ARCH: arm64

      - name: Assemble image
        run: sudo -E bash scripts/build-image.sh

      - name: Extract version
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Compress + checksum
        run: |
          sudo chown -R $USER:$USER dist/
          cd dist
          # Rename to versioned filename on tag builds; plain name on branch builds
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            mv mintkit-pizero2w.img mintkit-pizero2w-v${VERSION}.img
            IMG=mintkit-pizero2w-v${VERSION}.img
          else
            IMG=mintkit-pizero2w.img
          fi
          xz -T0 -9 "$IMG"
          sha256sum "${IMG}.xz" > "${IMG}.xz.sha256"
          md5sum    "${IMG}.xz" > "${IMG}.xz.md5"

      - name: Upload artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: mintkit-pizero2w-$ github.sha   # in real YAML: $ github.sha 
          path: dist/
          retention-days: 14

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          IMG_NAME="mintkit-pizero2w-v${VERSION}.img.xz"
          SHA256=$(awk '{print $1}' dist/${IMG_NAME}.sha256)
          MD5=$(awk '{print $1}' dist/${IMG_NAME}.md5)
          {
            echo ""
            echo "### Install"
            echo "Flash \`${IMG_NAME}\` to a microSD card using Raspberry Pi Imager or \`dd\`."
            echo "See the [download page](https://pocketmint.crystal-kitsune-studios.com/download) for full instructions."
            echo ""
            echo "### Checksums"
            echo "SHA256: ${SHA256}"
            echo "MD5:    ${MD5}"
          } > custom_footer.md

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # ⚠️ MANUAL FIX REQUIRED when copying to GitHub:
          # Notion cannot store double curly braces, so the lines below are broken.
          # In your actual build.yml, change them to:
          #
          #   name: "MintKit $ github.ref_name "
          #   prerelease: $ contains(github.ref_name, '-rc') 
          #
          # (add  and  around the expressions)
          
          name: "MintKit ${{github.ref_name}}"
          generate_release_notes: true
          body_path: custom_footer.md
          files: dist/*
          draft: false
          prerelease: "${{contains(github.ref_name, '-rc')}}"