# MintKit build configuration
MINTKIT_VERSION="0.5.0"
TARGET_ARCH="arm64"
TARGET_BOARD="pizero2w"
KERNEL_BRANCH="rpi-6.1.y"

# Output
DIST_DIR="$REPO_ROOT/dist"
ROOTFS_DIR="$REPO_ROOT/rootfs"
IMG_NAME="mintkit-pizero2w-v${MINTKIT_VERSION}.img"
IMG_SIZE_MB=2048

# Pi Zero 2 W specifics
BOARD_DTB="bcm2710-rpi-zero-2-w.dtb"
BOARD_DTB_OVERLAY=""
GPU_MEM=64

# Launcher
LAUNCHER_USER="mintkit"
LAUNCHER_HOME="/home/mintkit"
LAUNCHER_SERVICE="mintkit.service"